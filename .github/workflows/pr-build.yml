name: PR build

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  merge_group:

    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
  
jobs:
  checks:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: jverify-collection
          submodules: recursive
      - name: Build Dafny 
        run: |
          dotnet build ./jverify-collection/dafny/Source/Dafny.sln
      - name: Gradle test
        run: |
          ./jverify-collection/gradlew init test