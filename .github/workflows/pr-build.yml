name: PR build

on:
  workflow_dispatch:
  pull_request:
  merge_group:

    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
  
jobs:
  checks:
    strategy:
      matrix:
        os: [ ubuntu-24.04, windows-2022 ]
        include:
          - os: ubuntu-24.04
            chmod: true
          - os: windows-2022
            chmod: false
      fail-fast: false
        
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: jverify-collection
          submodules: recursive
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: gradle
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '23'
          cache: gradle
      - name: Build Strata
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory:
            ./jverify-collection/Strata
          build: "true"
          test: "false"
          lint: "false"
      - name: Verify Laurel AST is up to date
        working-directory: ./jverify-collection
        run: |
          make generate-laurel-ast
          git diff --exit-code --ignore-cr-at-eol verifier/src/main/java/com/aws/jverify/laurel/
      - name: Add Lake to path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "$HOME/.elan/bin"
      - name: Install z3 on PATH
        shell: bash
        run: |
          ARCH=$(uname -m)
          if [ "$OS" = "Windows_NT" ] || [ "$OS" = "MINGW"* ]; then
            ARCHIVE_NAME="z3-4.15.2-x64-win"
            curl -L -o z3.zip https://github.com/Z3Prover/z3/releases/download/z3-4.15.2/z3-4.15.2-x64-win.zip
            unzip z3.zip
          elif [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="x86_64"
            wget https://github.com/Z3Prover/z3/releases/download/z3-4.15.2/z3-4.15.2-x64-glibc-2.39.zip
            ARCHIVE_NAME="z3-4.15.2-x64-glibc-2.39"
            unzip "${ARCHIVE_NAME}.zip"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi
          chmod +x "${ARCHIVE_NAME}/bin/z3"
          echo "$GITHUB_WORKSPACE/${ARCHIVE_NAME}/bin/" >> $GITHUB_PATH
      - name: Install verifier CLI locally
        working-directory: ./jverify-collection
        run: |
          ./gradlew installDist
      - name: Publish packages locally
        working-directory: ./jverify-collection
        run: |
          ./gradlew publishToMavenLocal
      - name: Gradle test
        working-directory: ./jverify-collection
        run: |
          ./gradlew test --info
