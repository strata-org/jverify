name: PR build

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  merge_group:

    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
  
jobs:
  getVersion:
    uses: ./.github/workflows/dafny_version.yml
  
  checks:
    needs: getVersion
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2019 ]
        include:
          - os: ubuntu-22.04
            chmod: true
          - os: windows-2019
            chmod: false
      fail-fast: false
        
    runs-on: ${{ matrix.os }}

    env:
      z3BaseUri: https://github.com/dafny-lang/solver-builds/releases/download/snapshot-2024-04-10

    steps:
      - uses: actions/checkout@v4
        with:
          path: jverify-collection
          submodules: recursive
      - name: Set up Dafny (released)
        if: ${{ !needs.getVersion.outputs.buildDafnyFromSource }}
        uses: dafny-lang/setup-dafny-action@v1.9.0
        with:
          dafny-version: ${{ needs.getVersion.outputs.dafnyPrerelease || needs.getVersion.outputs.dafnyVersion }}
      - name: Set up Dafny (build from source)
        if: ${{ needs.getVersion.outputs.buildDafnyFromSource }}
        uses: dafny-lang/setup-dafny-action@v1.9.0
        with:
          dafny-version: ${{ needs.getVersion.outputs.dafnyVersion }}
          build-from-source: ${{ needs.getVersion.outputs.dafnyRef }}
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: gradle
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '23'
          cache: gradle
      # - name: Code generation has no diff
      #   working-directory: ./jverify-collection
      #   run: |
      #     make test-generation-nodiff
      - name: Gradle test
        working-directory: ./jverify-collection
        run: |
          ./gradlew test --info
      - name: Publish packages locally
        working-directory: ./jverify-collection
        run: |
          ./gradlew publishToMavenLocal
      - name: Sample project
        working-directory: ./jverify-collection/sample-project
        run: |
          ./gradlew test --info