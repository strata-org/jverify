name: PR build

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  merge_group:

    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
  
jobs:
  checks:
    strategy:
      matrix:
        os: [ ubuntu-22.04, windows-2019 ]
        include:
          - os: ubuntu-22.04
            chmod: true
          - os: windows-2019
            chmod: false
      fail-fast: false
        
    runs-on: ${{ matrix.os }}

    env:
      z3BaseUri: https://github.com/dafny-lang/solver-builds/releases/download/snapshot-2024-04-10

    steps:
      - uses: actions/checkout@v4
        with:
          path: jverify-collection
          submodules: recursive
      - name: Set up Dafny
        uses: dafny-lang/setup-dafny-action@v1.9.0
        with:
          dafny-version: 4.10.1
          build-from-source: aa1bce8c5c1255d9b64286e212b952d66e917f64
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: gradle
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '23'
          cache: gradle
      # - name: Code generation has no diff
      #   working-directory: ./jverify-collection
      #   run: |
      #     make test-generation-nodiff
      - name: Gradle test
        working-directory: ./jverify-collection
        run: |
          ./gradlew test --info
      - name: Publish packages locally
        working-directory: ./jverify-collection
        run: |
          ./gradlew publishToMavenLocal
      - name: Sample project
        working-directory: ./jverify-collection/sample-project
        run: |
          ./gradlew test --info